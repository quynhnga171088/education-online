spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    show-sql: false

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: ${APP_JWT_EXPIRATION_MS:900000}
  refresh-token:
    expiration-days: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:30}
  storage:
    upload-dir: ${APP_STORAGE_UPLOAD_DIR:/app/uploads}
    base-url: ${APP_STORAGE_BASE_URL:http://localhost:8080/uploads}

logging:
  level:
    root: WARN
    com.lms: INFO
    org.springframework.security: WARN
