spring:
  application:
    name: lms-backend

  # ─────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────
  datasource:
    # Local dev: match docker-compose.yml service `postgres` (port 5432 on host)
    url: jdbc:postgresql://127.0.0.1:5432/ 
    username: lms_user
    password: lms_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─────────────────────────────────────────
  # Flyway
  # ─────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─────────────────────────────────────────
  # File upload limits
  # ─────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB

# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ─────────────────────────────────────────
# App custom config
# ─────────────────────────────────────────
app:
  jwt:
    secret: "VGhpc0lzQURldlNlY3JldEtleUZvckxNUzIwMjZQbGF0Zm9ybUJhY2tlbmRNdXN0QmUyNTZCaXRzT3JNb3JlISE="
    expiration-ms: 900000        # 15 minutes
  refresh-token:
    expiration-days: 30
  storage:
    upload-dir: D:/lms-uploads
    base-url: http://localhost:8080/uploads

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging:
  level:
    root: INFO
    com.lms: DEBUG
    org.springframework.security: DEBUG
