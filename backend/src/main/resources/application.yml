spring:
  application:
    name: lms-backend

  # ─────────────────────────────────────────
  # Database
  # ─────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://192.168.99.60:5432/uob
    username: uob
    password: uob168
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ─────────────────────────────────────────
  # Flyway
  # ─────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ─────────────────────────────────────────
  # File upload limits
  # ─────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 2GB
      max-request-size: 2GB

# ─────────────────────────────────────────
# Server
# ─────────────────────────────────────────
server:
  port: 8080
  servlet:
    context-path: /

# ─────────────────────────────────────────
# App custom config
# ─────────────────────────────────────────
app:
  jwt:
    secret: "THIS_IS_A_DEV_SECRET_REPLACE_IN_PROD_WITH_256BIT_KEY_AT_MINIMUM"
    expiration-ms: 900000        # 15 minutes
  refresh-token:
    expiration-days: 30
  storage:
    upload-dir: D:/lms-uploads
    base-url: http://localhost:8080/uploads

# ─────────────────────────────────────────
# Logging
# ─────────────────────────────────────────
logging:
  level:
    root: INFO
    com.lms: DEBUG
    org.springframework.security: DEBUG
