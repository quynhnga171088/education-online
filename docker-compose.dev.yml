# ─────────────────────────────────────────────────────────────────────────────
# LMS — Development Override
#
# Disables the nginx service and exposes frontend/admin directly so that
# you can iterate without rebuilding the entire stack.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
version: '3.9'

services:

  # Disable nginx in dev — access services directly on their host ports
  nginx:
    profiles:
      - nginx-only   # will not start unless explicitly requested

  # Expose frontend directly on port 5173
  frontend:
    build:
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    expose: []

  # Expose admin directly on port 5174
  admin:
    build:
      args:
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5174:80"
    expose: []

  # Update backend storage base URL to match direct access
  backend:
    environment:
      APP_STORAGE_BASE_URL: http://localhost:8080/uploads

  # pgAdmin always enabled in dev
  pgadmin:
    profiles: []
