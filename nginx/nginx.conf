# ─────────────────────────────────────────────────────────────────────────────
# LMS — Nginx Reverse Proxy
# ─────────────────────────────────────────────────────────────────────────────
#
# Routing table:
#   Port 80   /api/*      → backend:8080  (strips /api prefix)
#   Port 80   /uploads/*  → backend:8080  (static file serving)
#   Port 80   /*          → frontend:80   (Student SPA)
#   Port 5174 /api/*      → backend:8080  (strips /api prefix)
#   Port 5174 /uploads/*  → backend:8080
#   Port 5174 /*          → admin:80      (Admin SPA)
# ─────────────────────────────────────────────────────────────────────────────

# ─── Upstream Services ───────────────────────────────────────────────────────
upstream backend_svc  { server backend:8080; }
upstream frontend_svc { server frontend:80;  }
upstream admin_svc    { server admin:80;     }

# ─── Main Site — Port 80 (Student Frontend + API) ────────────────────────────
server {
    listen 80;
    server_name _;

    # Allow large file uploads (video)
    client_max_body_size 500m;

    # Increase proxy timeouts for large video uploads
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── Health check ──────────────────────────────────────────────────────────
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ── REST API (/api/ → backend, strip /api prefix) ─────────────────────────
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass          http://backend_svc;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;

        # Disable buffering for streaming / Server-Sent Events
        proxy_buffering     off;
    }

    # ── Uploaded files (served by Spring resource handler) ───────────────────
    location /uploads/ {
        proxy_pass         http://backend_svc/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;

        # Range requests are handled natively by Spring (for video seek)
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;

        # Cache media files in the browser for 24 h
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── Student SPA (catch-all) ───────────────────────────────────────────────
    location / {
        proxy_pass         http://frontend_svc/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        # WebSocket upgrade (Vite HMR in dev mode – not used in prod but harmless)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}

# ─── Admin Panel — Port 5174 ─────────────────────────────────────────────────
server {
    listen 5174;
    server_name _;

    client_max_body_size 500m;
    proxy_connect_timeout 60s;
    proxy_send_timeout    300s;
    proxy_read_timeout    300s;

    # ── REST API (/api/ → backend, strip /api prefix) ─────────────────────────
    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass          http://backend_svc;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_buffering     off;
    }

    # ── Uploaded files ────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://backend_svc/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Range             $http_range;
        proxy_set_header   If-Range          $http_if_range;
        add_header         Cache-Control "public, max-age=86400";
    }

    # ── Admin SPA (catch-all) ─────────────────────────────────────────────────
    location / {
        proxy_pass         http://admin_svc/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }
}
