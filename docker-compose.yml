version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# LMS Full-Stack — Docker Compose
#
# Quick start:
#   cp .env.example .env        # fill in secrets
#   docker compose up -d        # build & start all services
#
# Service URLs (after startup):
#   Student Web  → http://localhost
#   Admin Panel  → http://localhost:5174
#   API (direct) → http://localhost:8080
#   pgAdmin      → http://localhost:5050  (profile: dev only)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ─────────────────────────────────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lms_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-lms_db}
      POSTGRES_USER:     ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────────────
  # pgAdmin 4 (dev only — start with: docker compose --profile dev up)
  # ─────────────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lms_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@lms.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - lms_network
    profiles:
      - dev

  # ─────────────────────────────────────────────────────────────────────────
  # Backend — Spring Boot
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE:         prod
      SPRING_DATASOURCE_URL:          jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME:     ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD:     ${POSTGRES_PASSWORD:-lms_password}
      APP_JWT_SECRET:                 ${APP_JWT_SECRET:-CHANGE_ME_IN_PRODUCTION_USE_LONG_RANDOM_SECRET_256BIT}
      APP_JWT_EXPIRATION_MS:          ${APP_JWT_EXPIRATION_MS:-900000}
      APP_REFRESH_TOKEN_EXPIRATION_DAYS: ${APP_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
      APP_STORAGE_UPLOAD_DIR:         /app/uploads
      # Public URL used when constructing file download links returned in API responses.
      # Via nginx proxy: http://localhost/uploads  (port 80)
      APP_STORAGE_BASE_URL:           ${APP_STORAGE_BASE_URL:-http://localhost/uploads}
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lms_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health 2>/dev/null | grep -q '\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend — Student Web (built with Vite, served by Nginx)
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # When using the nginx reverse proxy the API is accessed via /api/ prefix
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: lms_frontend
    restart: unless-stopped
    # Internal port 80 — accessed through nginx reverse proxy (port 80 on host)
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - lms_network

  # ─────────────────────────────────────────────────────────────────────────
  # Admin — Admin/Teacher Panel (built with Vite, served by Nginx)
  # ─────────────────────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    container_name: lms_admin
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - lms_network

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy & Entry Point
  #
  #   Port 80   → Student Frontend + API (/api/) + File Uploads (/uploads/)
  #   Port 5174 → Admin Panel + API (/api/) + File Uploads (/uploads/)
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: lms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "5174:5174"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - admin
      - backend
    networks:
      - lms_network

# ─────────────────────────────────────────────────────────────────────────────
# Volumes & Networks
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  uploads_data:

networks:
  lms_network:
    driver: bridge
